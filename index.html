<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Felspar Laundry Room</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen p-4 flex justify-center">

  <div class="w-full max-w-md">
    <!-- Header -->
    <div class="mb-6 border-b border-gray-800 pb-4">
      <h1 class="text-2xl font-bold flex items-center gap-2">🧺 Laundry Status</h1>
      <p class="text-xs text-gray-400">2066-2080 Felspar St • Live Laundry Machine Status</p>
    </div>

    <!-- Machine Grid -->
    <div id="machine-container" class="grid gap-4">
      <!-- Cards rendered dynamically by JS -->
    </div>
  </div>

  <script>
    // 1. Firebase Config
    const firebaseConfig = {
      databaseURL: "https://laundry-2-fc29c-default-rtdb.firebaseio.com"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const machinesRef = db.ref('machines');

    // Store data locally
    let currentData = null;

    // 2. Listen for Realtime Firebase Updates
    machinesRef.on('value', (snapshot) => {
      currentData = snapshot.val();
      renderMachines();
    });

    // 3. Countdown Math Function (Fixed at 45 minutes)
    function formatCountdown(startTimeMs, durationMinutes = 45) {
      if (!startTimeMs) return { text: "Ready to use", isDone: false };

      const totalDurationMs = durationMinutes * 60 * 1000;
      const elapsedMs = Date.now() - Number(startTimeMs);
      const remainingMs = totalDurationMs - elapsedMs;

      if (remainingMs <= 0) {
        return { text: "Cycle complete - needs unloading", isDone: true };
      }

      const totalSeconds = Math.floor(remainingMs / 1000);
      const mins = Math.floor(totalSeconds / 60);
      const secs = totalSeconds % 60;

      const formattedMins = String(mins).padStart(2, '0');
      const formattedSecs = String(secs).padStart(2, '0');

      return { text: `⏳ ${formattedMins}:${formattedSecs} remaining`, isDone: false };
    }

    // 4. Render UI
    function renderMachines() {
      if (!currentData) return;

      const container = document.getElementById('machine-container');
      let html = '';

      // Set display order
      const machineKeys = ['1washer1', '1washer2', '2dryer1', '2dryer2'];

      machineKeys.forEach((key) => {
        const m = currentData[key];
        if (!m) return;

        const isRunning = m.status === 'in_use';
        
        let timeRemainingText = "Ready to use";
        let badgeColor = "bg-emerald-500/20 text-emerald-400 border-emerald-500/30";
        let badgeText = "🟢 AVAILABLE";
        let isDone = false;

        if (isRunning) {
          // Force duration to 45 minutes for all machines
          const countdown = formatCountdown(m.startTime, 45);
          timeRemainingText = countdown.text;
          isDone = countdown.isDone;

          if (isDone) {
            badgeColor = "bg-red-500/20 text-red-400 border-red-500/30";
            badgeText = "🔴 NEEDS UNLOADING";
          } else {
            badgeColor = "bg-yellow-500/20 text-yellow-400 border-yellow-500/30";
            badgeText = "⏱️ IN USE";
          }
        }

        const textColorClass = isDone ? 'text-red-400 font-semibold' : (isRunning ? 'text-yellow-400 font-mono font-medium' : 'text-emerald-400');

        html += `
          <div class="bg-gray-800 border border-gray-700/60 rounded-xl p-4 flex flex-col justify-between shadow-lg">
            <div class="flex justify-between items-start mb-2">
              <span class="font-semibold text-lg text-gray-200">${m.name}</span>
              <span class="text-xs font-mono px-2.5 py-1 rounded-full border ${badgeColor}">
                ${badgeText}
              </span>
            </div>
            <div class="text-sm ${textColorClass}">${timeRemainingText}</div>
          </div>
        `;
      });

      container.innerHTML = html;
    }

    // 5. Re-render every second to tick down the MM:SS timer cleanly
    setInterval(renderMachines, 1000);
  </script>
</body>
</html>
