     // Function to format milliseconds into MM:SS
function formatCountdown(startTimeMs, durationMinutes) {
  if (!startTimeMs) return { text: "In Use", isDone: false };

  const totalDurationMs = durationMinutes * 60 * 1000;
  const elapsedMs = Date.now() - Number(startTimeMs);
  const remainingMs = totalDurationMs - elapsedMs;

  // If time has genuinely expired
  if (remainingMs <= 0) {
    return { text: "Cycle complete - needs unloading", isDone: true };
  }

  // Calculate minutes and seconds remaining
  const totalSeconds = Math.floor(remainingMs / 1000);
  const mins = Math.floor(totalSeconds / 60);
  const secs = totalSeconds % 60;

  // Pad with leading zeros (e.g. 05:09)
  const formattedMins = String(mins).padStart(2, '0');
  const formattedSecs = String(secs).padStart(2, '0');

  return { text: `${formattedMins}:${formattedSecs} remaining`, isDone: false };
}

// Ensure the UI updates every 1 second so the timer ticks live on screen
setInterval(() => {
  dbRef.once('value', (snapshot) => {
    const data = snapshot.val();
    if (!data) return;

    const machineKeys = ['1washer1', '1washer2', '2dryer1', '2dryer2'];
    let html = '';

    machineKeys.forEach((key) => {
      const machine = data[key];
      if (!machine) return;

      let statusDisplay = "🟢 Available";
      let statusClass = "available";

      if (machine.status === 'in_use') {
        const countdown = formatCountdown(machine.startTime, machine.durationMin || 45);
        statusDisplay = countdown.isDone ? "🔴 " + countdown.text : "⏳ " + countdown.text;
        statusClass = countdown.isDone ? "needs-unloading" : "in-use";
      }

      html += `
        <div class="machine-card ${statusClass}">
          <h2>${machine.name}</h2>
          <p class="status">${statusDisplay}</p>
        </div>
      `;
    });

    document.getElementById('machines-container').innerHTML = html;
  });
}, 1000);
